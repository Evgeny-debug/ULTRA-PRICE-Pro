            --card-bg: #1c1c1e;

            --text-sec: #8e8e93;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        [data-theme="light"] {
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-sec: #8e8e93;
            --glass: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background-color 0.5s ease;
            overflow: hidden;
            width: 100vw; height: 100vh;
            position: fixed;
        }

        /* --- Header --- */
        .header-floating {
            position: fixed;
            top: 15px; left: 16px; right: 16px;
            height: 60px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 10000;
            border-radius: 22px;
            border: 0.5px solid var(--glass-border);
            display: flex; align-items: center; padding: 0 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .search-row { display: flex; gap: 8px; width: 100%; align-items: center; }
        #searchInput { flex: 1; padding: 10px 14px; border-radius: 14px; border: none; background: rgba(255,255,255,0.06); color: var(--text-main); font-size: 16px; outline: none; min-width: 0; }
        
        #confirmBtn { 
            background: var(--apple-blue); 
            color: white; border: none; border-radius: 12px; 
            padding: 10px 16px; font-weight: 700; font-size: 13px; 
            flex-shrink: 0; transition: transform 0.1s;
            cursor: pointer;
        }
        #confirmBtn:active { transform: scale(0.95); opacity: 0.8; }

        .theme-btn { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 4px; display: flex; }

        /* --- Viewport --- */
        #viewport {
            width: 100%; height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 95px 16px 240px; 
        }

        #rubber-wrapper {
            will-change: transform;
            display: flex; flex-direction: column; gap: 14px;
            max-width: 500px; margin: 0 auto;
        }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-sec); font-size: 15px; }

        /* --- Cards --- */
        .card {
            background: var(--card-bg);
            border-radius: 26px;
            padding: 22px;
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .card.is-selected { border-color: var(--apple-blue); background: linear-gradient(180deg, var(--card-bg) 0%, rgba(0,122,255,0.03) 100%); transform: scale(0.98); }
        .card.status-trauma { animation: shake 0.4s ease; border-color: var(--apple-red) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .model-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .model-name { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
        .service-type { color: var(--text-sec); font-size: 14px; font-weight: 400; margin-top: 2px; }
        
        .client-box { text-align: right; }
        .client-label { font-size: 10px; font-weight: 700; color: var(--apple-blue); text-transform: uppercase; margin-bottom: 2px; }
        .client-price { font-size: 18px; font-weight: 800; transition: color 0.3s; }

        .limits-row { font-size: 11px; color: var(--text-sec); margin-top: 6px; font-weight: 500; }

        .price-footer {
            margin-top: 18px; padding-top: 14px;
            border-top: 0.5px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .formula { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px; color: var(--text-sec); opacity: 0.6; }
        .profit-display { font-size: 30px; font-weight: 900; letter-spacing: -1px; position: relative; transition: color 0.3s; }

        .status-azart .profit-display { color: var(--apple-green); text-shadow: 0 0 15px rgba(52,199,89,0.2); }
        .status-trauma .profit-display, .status-trauma .client-price { color: var(--apple-red); }

        .fly-val { position: absolute; top: -25px; right: 0; font-size: 16px; font-weight: 800; pointer-events: none; animation: flyUp 0.8s forwards; }
        @keyframes flyUp { 0% { opacity: 0; transform: translateY(10px); } 30% { opacity: 1; } 100% { opacity: 0; transform: translateY(-45px); } }

        /* --- Footer --- */
        .footer-glass {
            position: fixed; bottom: 30px; left: 16px; right: 16px;
            background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);

        }
        .controls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        }
        .controls-grid input.valid-code { background: rgba(52, 199, 89, 0.15); border: 1px solid var(--apple-green); color: var(--apple-green); }
    </style>
</head>

        'стекло': 'стекло', 'стекла': 'стекло', 'стеклышко': 'стекло', 'камера': 'камера', 'основная': 'основная', 'фронталка': 'фронтальная', 'глазок': 'стекло',
        'гнездо': 'разъем', 'разьем': 'разъем', 'зарядка': 'зарядки', 'зарядное': 'зарядки', 'шлейф': 'разъем', 'тайпси': 'разъем', 'type-c': 'разъем', 'lightning': 'разъем',
        'динамик': 'динамик', 'звук': 'динамик', 'слуховой': 'слуховой', 'верхний': 'слуховой', 'полифонический': 'полифонический', 'нижний': 'полифонический', 'динамики': 'динамик', 'микрофон': 'динамик',
        'кнопка': 'кнопки', 'кнопок': 'кнопки', 'включения': 'вкл', 'громкости': 'громкость', 'плата': 'платы', 'пайка': 'пайка', 'контроллер': 'контроллер',
        'ориг': 'оригинал', 'оригинальный': 'оригинал', 'коп': 'копия', 'китай': 'копия', 'аналог': 'копия', 'подделка': 'копия'
    };

    const ignoreWords = ['замена', 'ремонт', 'починить', 'разбил', 'сломал', 'глючит', 'не', 'работает', 'на', 'в', 'для', 'у', 'под', 'сколько', 'стоит', 'цена', 'стоимость', 'прайс', 'гривен', 'грн'];

    const database = [];
    modelsData.forEach(phone => {
        for (const [repairType, qualities] of Object.entries(basePrices)) {
            for (const [quality, prices] of Object.entries(qualities)) {
                // Применяем Множитель Модели (m) и Курс Доллара (USD), округляем до 50
                const cp = Math.round((prices[0] * phone.m * USD) / 50) * 50;
                const pc = Math.round((prices[1] * phone.m * USD) / 50) * 50;
                
                const totalProfit = cp - pc - DELIVERY_COST;
                const safeProfit = totalProfit > 0 ? totalProfit : 0;
                
                const maxDiscount = Math.floor((safeProfit * 0.4) / 50) * 50; 
                const maxMarkup = Math.floor((cp * 0.15) / 50) * 50;

                const searchString = `${phone.brand} ${phone.model} ${repairType} ${quality}`.toLowerCase().replace(/[^a-zа-яё0-9\s]/g, '');

                database.push({
                    id: `${phone.model}-${repairType}-${quality}`.replace(/\s+/g, '-'),
                    brand: phone.brand, model: phone.model, repair: repairType, quality: quality,
                    baseCP: cp, basePC: pc, baseProfit: safeProfit, 
                    maxM: maxMarkup, maxD: maxDiscount, searchStr: searchString
                });
            }
        }
    });

    const history = new Map();
    let activeId = null;
    let isStrict = false;

    // ==========================================
    // 4. ЛОГИКА ФИЛЬТРАЦИИ И ПОИСКА
    // ==========================================
    function parseQuery(rawQuery) {
        let query = rawQuery.toLowerCase().replace(/[^a-zа-яё0-9\s]/g, '');
        let words = query.split(/\s+/).filter(w => w.length > 0);
        let searchTerms = [];

        words.forEach(word => {
            if (ignoreWords.includes(word)) return;
            let term = dictionary[word] || word;
            if (!searchTerms.includes(term)) searchTerms.push(term);
        });

        // Слияние сложных терминов (Умный парсер)
        const joinTerms = (arr, t1, t2, res) => {
            if (arr.includes(t1) && arr.includes(t2)) {
                arr = arr.filter(t => t !== t1 && t !== t2); arr.push(res);
            } return arr;
        };

        searchTerms = joinTerms(searchTerms, 'стекло', 'камера', 'стекло камеры');
        searchTerms = joinTerms(searchTerms, 'основная', 'камера', 'основная камера');
        searchTerms = joinTerms(searchTerms, 'фронтальная', 'камера', 'фронтальная камера');
        searchTerms = joinTerms(searchTerms, 'задняя', 'крышка', 'задняя крышка');
        searchTerms = joinTerms(searchTerms, 'разъем', 'зарядки', 'разъем зарядки');
        searchTerms = joinTerms(searchTerms, 'слуховой', 'динамик', 'слуховой динамик');
        searchTerms = joinTerms(searchTerms, 'динамик', 'полифонический', 'динамик полифонический');

        return searchTerms;
    }

    function calculate(item, isSelected) {
        const m = isSelected ? (parseFloat(document.getElementById('markupInput').value) || 0) : 0;
        const d = isSelected ? (parseFloat(document.getElementById('discountInput').value) || 0) : 0;
        
        // FIXOMAT Logic
        const pInput = document.getElementById('promoInput');
        const isFix = pInput.value.toUpperCase() === 'FIXOMAT';
        if (isSelected && isFix) pInput.classList.add('valid-code'); 
        else if (isSelected) pInput.classList.remove('valid-code');

        const client = item.baseCP + m - d;
        const profit = client - item.basePC - DELIVERY_COST;
        
        // Доля (51% если FIXOMAT, иначе 50%)
        const share = Math.round(profit * (isFix ? 0.51 : 0.5));
        const baseShare = Math.round(item.baseProfit * 0.5);

        let status = 'normal';
        if (isSelected) {
            if (share > baseShare) status = 'azart';
            else if (share < baseShare) status = 'trauma';
        }
        return { share, client, status, math: `${client}-${item.basePC}-${DELIVERY_COST}` };
    }

    function refresh() {
        const q = document.getElementById('searchInput').value;
        const root = document.getElementById('content-root');
        if (q.length < 2) { 
            root.innerHTML = '<div class="empty-state">Введите бренд, модель и деталь<br>База адаптирована к рынку 2026 года</div>'; 
            activeId = null; return; 
        }
        
        const terms = parseQuery(q);
        
        let filtered = database.filter(item => {
            const matchAll = terms.every(t => item.searchStr.includes(t));
            
            // STRICT MATCH (Кнопка Найти)
            if (isStrict) {
                const isPro = terms.some(t => t === 'pro');
                const isMax = terms.some(t => t === 'max');
                const isPlus = terms.some(t => t === 'plus');
                const isMini = terms.some(t => t === 'mini');
                const mdl = item.model.toLowerCase();
                
                if (isMax && !mdl.includes('max')) return false;
                if (isPlus && !mdl.includes('plus')) return false;
                if (isMini && !mdl.includes('mini')) return false;
                if (isPro && !isMax && mdl.includes('max')) return false;
                if (isPro && !mdl.includes('pro')) return false;
                if (!isPro && !isMax && !isPlus && !isMini && (mdl.includes('pro') || mdl.includes('max') || mdl.includes('plus') || mdl.includes('mini'))) return false;
            }
            return matchAll;
        });

        if (filtered.length === 0) {
            root.innerHTML = '<div class="empty-state">Ничего не найдено.<br>Попробуйте другие слова.</div>';
            return;
        }

        root.innerHTML = filtered.map(i => {
            const res = calculate(i, i.id === activeId);
            const old = history.get(i.id) || res.share;
            const diff = res.share - old;
            history.set(i.id, res.share);
            
            const mood = res.status === 'trauma' ? 'status-trauma' : (res.status === 'azart' ? 'status-azart' : '');
            
            return `
                <div class="card ${i.id === activeId ? 'is-selected' : ''} ${mood}" onclick="sel('${i.id}')">
                    <div class="model-header">
                        <div>
                            <div class="model-name">${i.model}</div>
                            <div class="service-type">${i.repair} (${i.quality})</div>
                        </div>
                        <div class="client-box">
                            <div class="client-label">Клиенту</div>
                            <div class="client-price">${res.client} ₴</div>
                        </div>
                    </div>
                    <div class="limits-row">Лимиты: <span style="color:var(--apple-green)">+${i.maxM}</span> / <span style="color:var(--apple-red)">-${i.maxD}</span></div>
                    <div class="price-footer">
                        <div class="formula">${res.math}</div>
                        <div class="profit-display">
                            ${diff !== 0 && i.id === activeId ? `<span class="fly-val" style="color:${diff>0?'var(--apple-green)':'var(--apple-red)'}">${diff>0?'+':''}${diff}</span>` : ''}
                            ${res.share} ₴
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    document.getElementById('confirmBtn').addEventListener('click', () => { isStrict = true; refresh(); });
    document.getElementById('searchInput').addEventListener('input', () => { isStrict = false; activeId = null; refresh(); });

    window.sel = (id) => {
        if (activeId !== id) {
            document.getElementById('markupInput').value = '';
            document.getElementById('discountInput').value = '';
            activeId = id;
        } else activeId = null;
        refresh();
    };

    // ==========================================
    // 5. ФИЗИКА (RUBBER BAND)
    // ==========================================
    const wrapper = document.getElementById('rubber-wrapper');
    const viewport = document.getElementById('viewport');
    let sY = 0;
    viewport.addEventListener('touchstart', (e) => { sY = e.touches[0].pageY; wrapper.style.transition = 'none'; }, { passive: true });
    viewport.addEventListener('touchmove', (e) => {
        const d = e.touches[0].pageY - sY;
        const sc = viewport.scrollTop;
        if ((sc <= 0 && d > 0) || (sc >= viewport.scrollHeight - viewport.clientHeight - 1 && d < 0)) {
            wrapper.style.transform = `translateY(${d * 0.4}px)`;
        }
    }, { passive: true });
    viewport.addEventListener('touchend', () => {
        wrapper.style.transition = 'transform 0.5s cubic-bezier(0.15, 0.85, 0.35, 1.2)';
        wrapper.style.transform = 'translateY(0px)';
    });

    ['markupInput', 'discountInput', 'promoInput'].forEach(id => document.getElementById(id).addEventListener('input', refresh));
    
    // ==========================================
    // 6. ТЕМЫ
    // ==========================================
    document.getElementById('themeToggle').addEventListener('click', () => {
        const d = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', d ? 'light' : 'dark');
        document.getElementById('themeIcon').innerHTML = d 
            ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>'
            : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    });

    // Initial render
    refresh();
</script>
</body>
</html>
